name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
          - os: macos-latest
            target: mac
          - os: ubuntu-latest
            target: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Install WiX (Windows)
        if: matrix.target == 'win'
        shell: pwsh
        run: |
          $light = Get-Command light -ErrorAction SilentlyContinue
          if ($light) {
            echo "WiX already available at: $($light.Source)"
            exit 0
          }
          $paths = @(
            "C:\Program Files (x86)\WiX Toolset v3.14\bin",
            "C:\Program Files\WiX Toolset v3.14\bin",
            "C:\Program Files (x86)\WiX Toolset v3.11\bin",
            "C:\Program Files\WiX Toolset v3.11\bin"
          )
          $found = $false
          foreach ($p in $paths) {
            if (Test-Path "$p\light.exe") {
              echo "Found WiX at $p"
              echo "$p" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
              $found = $true
              break
            }
          }
          if (-not $found) {
            echo "WiX not found, installing via Chocolatey..."
            choco install wixtoolset -y --no-progress
            $chocoWix = "C:\Program Files (x86)\WiX Toolset v3.11\bin"
            if (Test-Path "$chocoWix\light.exe") {
              echo "$chocoWix" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            }
          }
          $light = Get-Command light -ErrorAction SilentlyContinue
          if ($light) {
            echo "WiX verified: $($light.Source)"
          } else {
            echo "WARNING: WiX still not found after installation"
          }

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build & package Electron app
        run: npm run dist:${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Rename artifacts with platform labels
        if: always()
        shell: bash
        run: |
          cd dist || exit 0
          for f in *win-x64*; do
            [ -f "$f" ] && mv "$f" "${f//win-x64/windows-x64}"
          done
          for f in *mac-x64*; do
            [ -f "$f" ] && mv "$f" "${f//mac-x64/macos-x64}"
          done
          for f in *mac-arm64*; do
            [ -f "$f" ] && mv "$f" "${f//mac-arm64/macos-arm64}"
          done
          for f in *linux-x64*; do
            [ -f "$f" ] && mv "$f" "${f//linux-x64/linux-x64}"
          done
          echo "=== dist contents ==="
          ls -la || true

      - name: List dist contents (diagnostic)
        if: always()
        shell: bash
        run: |
          echo "=== dist contents ==="
          ls -la dist/ || echo "dist directory not found"
          echo "=== dist files ==="
          find dist -type f -name "*" | head -50 || true

      - name: Upload Windows installer
        if: matrix.target == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/*.zip
          if-no-files-found: error

      - name: Upload macOS DMG (x64)
        if: matrix.target == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg-x64
          path: dist/*-x64.dmg
          if-no-files-found: error

      - name: Upload macOS DMG (arm64)
        if: matrix.target == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg-arm64
          path: dist/*-arm64.dmg
          if-no-files-found: error

      - name: Upload Linux AppImage
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
