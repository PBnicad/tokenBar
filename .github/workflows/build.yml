name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
          - os: macos-latest
            target: mac
          - os: ubuntu-latest
            target: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version

      - name: Build app
        run: npm run build

      - name: Build & package Electron app
        run: npm run dist:${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List dist contents (diagnostic)
        if: always()
        shell: bash
        run: |
          echo "=== dist contents ==="
          ls -la dist/ || echo "dist directory not found"
          echo "=== dist files ==="
          find dist -type f -name "*" | head -50 || true

      - name: Rename macOS x64 DMG
        if: matrix.target == 'mac'
        shell: bash
        run: |
          cd dist
          for f in *.dmg; do
            if [[ "$f" != *-arm64.dmg ]]; then
              mv "$f" "${f%.dmg}-x64.dmg"
              break
            fi
          done

      - name: Upload Windows installer
        if: matrix.target == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/*.zip
          if-no-files-found: error

      - name: Upload macOS DMG (x64)
        if: matrix.target == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg-x64
          path: dist/*-x64.dmg
          if-no-files-found: error

      - name: Upload macOS DMG (arm64)
        if: matrix.target == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg-arm64
          path: dist/*-arm64.dmg
          if-no-files-found: error

      - name: Upload Linux AppImage
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
