name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
          - os: macos-latest
            target: mac
          - os: ubuntu-latest
            target: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Install WiX (Windows)
        if: matrix.target == 'win'
        shell: pwsh
        run: |
          # First, check if WiX is already available
          $light = Get-Command light -ErrorAction SilentlyContinue
          if ($light) {
            echo "WiX already available at: $($light.Source)"
            exit 0
          }
          # Search for light.exe in common locations
          $paths = @(
            "C:\Program Files (x86)\WiX Toolset v3.14\bin",
            "C:\Program Files\WiX Toolset v3.14\bin",
            "C:\Program Files (x86)\WiX Toolset v3.11\bin",
            "C:\Program Files\WiX Toolset v3.11\bin"
          )
          $found = $false
          foreach ($p in $paths) {
            if (Test-Path "$p\light.exe") {
              echo "Found WiX at $p"
              echo "$p" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
              $found = $true
              break
            }
          }
          if (-not $found) {
            echo "WiX not found, installing via Chocolatey..."
            choco install wixtoolset -y --no-progress
            $chocoWix = "C:\Program Files (x86)\WiX Toolset v3.11\bin"
            if (Test-Path "$chocoWix\light.exe") {
              echo "$chocoWix" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            }
          }
          # Verify
          $light = Get-Command light -ErrorAction SilentlyContinue
          if ($light) {
            echo "WiX verified: $($light.Source)"
          } else {
            echo "WARNING: WiX still not found after installation"
          }

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build & package Electron app
        run: npm run dist:${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List dist contents (diagnostic)
        if: always()
        shell: bash
        run: |
          echo "=== dist contents ==="
          ls -la dist/ || echo "dist directory not found"
          echo "=== dist files ==="
          find dist -type f -name "*" | head -50 || true

      - name: Rename macOS x64 DMG
        if: matrix.target == 'mac'
        shell: bash
        run: |
          cd dist
          for f in *.dmg; do
            if [[ "$f" != *-arm64.dmg ]]; then
              mv "$f" "${f%.dmg}-x64.dmg"
              break
            fi
          done

      - name: Upload Windows MSI
        if: matrix.target == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: win-msi
          path: dist/*.msi
          if-no-files-found: error

      - name: Upload macOS DMG (x64)
        if: matrix.target == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg-x64
          path: dist/*-x64.dmg
          if-no-files-found: error

      - name: Upload macOS DMG (arm64)
        if: matrix.target == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg-arm64
          path: dist/*-arm64.dmg
          if-no-files-found: error

      - name: Upload Linux AppImage
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
