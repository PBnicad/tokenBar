name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
          - os: macos-latest
            target: mac
          - os: ubuntu-latest
            target: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules (Windows)
        if: matrix.target == 'win'
        run: npx electron-builder install-app-deps

      - name: Build app
        run: npm run build

      - name: Build & package Electron app
        run: npm run dist:${{ matrix.target }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Rename artifacts with platform labels
        if: always()
        shell: bash
        run: |
          cd dist || exit 0
          for f in *win-x64*; do
            [ -f "$f" ] && mv "$f" "${f//win-x64/windows-x64}"
          done
          for f in *mac-x64*; do
            [ -f "$f" ] && mv "$f" "${f//mac-x64/macos-x64}"
          done
          for f in *mac-arm64*; do
            [ -f "$f" ] && mv "$f" "${f//mac-arm64/macos-arm64}"
          done
          for f in *linux-x64*; do
            [ -f "$f" ] && mv "$f" "${f//linux-x64/linux-x64}"
          done
          echo "=== dist contents ==="
          ls -la || true

      - name: List dist contents (diagnostic)
        if: always()
        shell: bash
        run: |
          echo "=== dist contents ==="
          ls -la dist/ || echo "dist directory not found"
          echo "=== dist files ==="
          find dist -type f -name "*" | head -50 || true

      - name: Upload Windows installer
        if: matrix.target == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/*.zip
          if-no-files-found: error

      - name: Upload macOS DMG (x64)
        if: matrix.target == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg-x64
          path: dist/*-x64.dmg
          if-no-files-found: error

      - name: Upload macOS DMG (arm64)
        if: matrix.target == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg-arm64
          path: dist/*-arm64.dmg
          if-no-files-found: error

      - name: Upload Linux AppImage
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
